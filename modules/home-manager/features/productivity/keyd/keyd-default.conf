# keyd config — the Linux counterpart of the macOS Karabiner setup (Colemak +
# nav + symbol layers). Applies to every keyboard EXCEPT the QMK Bridge75
# (0c45:fefe), which does Colemak + layers in firmware. If you use the Bridge75
# over Bluetooth/2.4G it may enumerate with a different id — find it with
# `sudo keyd monitor` and add another `-vvvv:pppp` line under [ids].
#
# Apply with: sudo keyd-setup   (installs keyd, copies this to /etc/keyd, reloads)

[ids]
*
-0c45:fefe

[main]
# Caps: tap = Esc, hold = nav layer.
capslock = overload(nav, esc)
# Right Alt: hold = symbol layer (pure layer key, like right_option in Karabiner).
rightalt = layer(sym)
# Esc (top-left) = Hyper+Space (toggle the launcher), matching Karabiner.
esc = C-A-S-M-space
# Left Super: tap = window switcher (sends C-A-w, which GNOME runs as
# `rofi -show window` — the Raycast Switch-Windows analog); hold = normal Super
# (Super+Tab etc. still work). Mirrors the macs' tap-Left-Cmd -> Raycast.
leftmeta = overload(meta, C-A-w)
# Right Shift: tap = switch to last app (Super+Tab = GNOME switch-applications,
# the Cmd+Tab analog); hold = normal Shift. Mirrors the macs' tap-Right-Shift and
# the Bridge75 firmware, which sends GUI+Tab on a right-Shift tap.
rightshift = overload(shift, M-tab)

# Base Colemak (QWERTY physical key -> Colemak output).
e = f
r = p
t = g
y = j
u = l
i = u
o = y
p = semicolon
s = r
d = s
f = t
g = d
j = n
k = e
l = i
semicolon = o
n = k

[nav]
# Caps held: arrows + paging; Caps+M = warpd hint (GNOME Alt+Super+x shortcut).
h = left
j = down
k = up
l = right
y = home
p = end
u = pageup
o = pagedown
m = A-M-x

[sym]
# Right Alt held: digits, shifted symbols, brackets/punctuation.
a = 1
s = 2
d = 3
f = 4
g = 5
z = 6
x = 7
c = 8
v = 9
b = 0
q = S-1
w = S-2
e = S-3
r = S-4
t = S-5
y = S-6
u = S-7
i = S-8
o = S-9
p = S-0
h = minus
j = equal
k = leftbrace
l = rightbrace
semicolon = backslash
apostrophe = grave
n = S-minus
m = S-equal
comma = S-leftbrace
dot = S-rightbrace
slash = S-backslash
